<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Melon Music Archive</title>
    <style>
        :root {
            --melon-green: #00cd3c;
            --dark-bg: #121212;
            --card-bg: #1e1e1e;
            --text-color: #e0e0e0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--dark-bg);
            color: var(--text-color);
            margin: 0;
            padding: 20px;
            display: flex;
            justify-content: center;
        }

        .container {
            width: 100%;
            max-width: 600px;
        }

        header {
            text-align: center;
            margin-bottom: 30px;
        }

        h1 { color: var(--melon-green); font-size: 2rem; margin-bottom: 10px; }
        header p { color: #888; margin: 0; }

        .input-section {
            background: var(--card-bg);
            padding: 20px;
            border-radius: 15px;
            box-shadow: 0 8px 16px rgba(0,0,0,0.4);
            margin-bottom: 25px;
        }

        .input-group {
            display: flex;
            gap: 10px;
        }

        input {
            flex: 1;
            padding: 12px;
            border-radius: 8px;
            border: 1px solid #333;
            background: #000;
            color: #fff;
            outline: none;
        }

        button {
            padding: 12px 20px;
            background-color: var(--melon-green);
            color: #000;
            border: none;
            border-radius: 8px;
            font-weight: bold;
            cursor: pointer;
            transition: 0.2s;
        }

        button:hover {
            transform: scale(1.02);
            opacity: 0.9;
        }

        .list-container {
            display: grid;
            gap: 12px;
        }

        .music-card {
            background: var(--card-bg);
            padding: 15px;
            border-radius: 10px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-left: 4px solid var(--melon-green);
            animation: fadeIn 0.3s ease;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .info h3 { margin: 0; font-size: 1.1rem; color: #fff; }
        .info p { margin: 5px 0 0; color: #888; font-size: 0.85rem; }

        .action-btns {
            display: flex;
            gap: 8px;
        }

        .btn-sm {
            padding: 8px 12px;
            font-size: 0.75rem;
            border-radius: 5px;
            text-decoration: none;
            display: inline-block;
            font-weight: bold;
        }

        .del-btn { background: #ff4d4d; color: #fff; border: none; cursor: pointer; }
        .link-btn { background: #333; color: #fff; }

        .del-btn:hover { background: #ff3333; }
        .link-btn:hover { background: #444; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>🍈 Melon Archive</h1>
        <p>곡 ID를 입력하여 프로듀싱 라이브러리를 만드세요.</p>
    </header>

    <div class="input-section">
        <div class="input-group">
            <input type="text" id="songId" placeholder="멜론 곡 ID (7자리 숫자)">
            <button onclick="addMusic()">추가하기</button>
        </div>
    </div>

    <div id="musicList" class="list-container"></div>
</div>

<script>
    let playlist = JSON.parse(localStorage.getItem('melon_archive_v1')) || [];

    function render() {
        const container = document.getElementById('musicList');
        container.innerHTML = '';
        
        if (playlist.length === 0) {
            container.innerHTML = '<p style="text-align:center; color:#555; margin-top:20px;">저장된 곡이 없습니다.</p>';
        }

        playlist.forEach((item, index) => {
            const card = document.createElement('div');
            card.className = 'music-card';
            card.innerHTML = `
                <div class="info">
                    <h3>${item.title}</h3>
                    <p>${item.artist} | ID: ${item.id}</p>
                </div>
                <div class="action-btns">
                    <a href="https://www.melon.com/song/detail.htm?songId=${item.id}" target="_blank" class="btn-sm link-btn">상세보기</a>
                    <button onclick="removeMusic(${index})" class="btn-sm del-btn">삭제</button>
                </div>
            `;
            container.appendChild(card);
        });
    }

    function addMusic() {
        const idInput = document.getElementById('songId');
        const id = idInput.value.trim();
        if(!id) return alert("ID를 입력하세요!");

        const title = prompt("곡 제목을 입력하세요:");
        const artist = prompt("아티스트명을 입력하세요:");

        if(title && artist) {
            playlist.unshift({ id, title, artist });
            localStorage.setItem('melon_archive_v1', JSON.stringify(playlist));
            idInput.value = '';
            render();
        }
    }

    function removeMusic(index) {
        if(confirm("이 항목을 삭제하시겠습니까?")) {
            playlist.splice(index, 1);
            localStorage.setItem('melon_archive_v1', JSON.stringify(playlist));
            render();
        }
    }

    render();
</script>
</body>
</html>
